site_name: Brazilian Public Data Suite
site_description: Tools for extracting, processing and analyzing Brazilian public datasets.
site_author: Komesu, D.K.

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.ico
  font:
    code: Google Sans Code
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

nav:
  - Home:
      - Overview: index.md
      - Design Philosophy: design-philosophy.md
      - Best Practices: best-practices.md

  - Data Tools & Sources:
      - IBGE (Macroeconomics):
          - ibge/index.md
          - sidra-fetcher: ibge/sidra-fetcher.md
          - sidra-sql: ibge/sidra-sql.md
          - sidra-pipelines: ibge/sidra-pipelines.md
      - Treasury (Finance):
          - tesouro/index.md
          - tddata: tesouro/tddata.md
          - Portfolio Returns Guide: tesouro/calculo-retornos.md
      - Labor Market:
          - trabalho/index.md
          - pdet-data: trabalho/pdet-data.md
          - Parquet + Polars Guide: trabalho/guia-parquet.md
      - Foreign Trade: comex/comexdown.md
      - Public Health: saude/datasus-fetcher.md
      - Climate & Environment: clima/inmet-bdmep-data.md

  - Architecture & Concepts:
      - Platform Architecture: architecture/overview.md
      - Design Principles: architecture/design-principles.md
      - Data Engineering: concepts/data-engineering.md
      - Pipelines & Storage: concepts/pipelines.md

plugins:
  - search

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  mathjax_config:
    tex:
      inlineMath: [['$', '$'], ['\\(', '\\)']]
      displayMath: [['$$', '$$'], ['\\[', '\\]']]

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
