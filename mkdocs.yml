site_name: Plataforma Brasileira de Dados Públicos
site_description: Ferramentas para extrair, processar e analisar datasets públicos brasileiros.
site_author: Komesu, D.K.

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.ico
  font:
    code: Google Sans Code
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

nav:
  - Visão Geral: index.md

  - Conceitos:
      - concepts/index.md
      - Arquitetura da Plataforma: concepts/arquitetura.md
      - Princípios de Design: concepts/principios.md
      - Padrões Práticos: concepts/padroes.md
      - Parquet + Polars: concepts/parquet-polars.md

  - Domínios & Ferramentas:
      - IBGE (Macroeconomia):
          - ibge/index.md
          - sidra-fetcher: ibge/sidra-fetcher.md
          - sidra-sql: ibge/sidra-sql.md
          - sidra-pipelines: ibge/sidra-pipelines.md
      - Tesouro (Finanças):
          - tesouro/index.md
          - tddata: tesouro/tddata.md
          - rtnpy: tesouro/rtnpy.md
          - Cálculo de Retornos: tesouro/calculo-retornos.md
      - Mercado de Trabalho:
          - trabalho/index.md
          - pdet-data: trabalho/pdet-data.md
      - Comércio Exterior: comex/comexdown.md
      - Saúde Pública: saude/datasus-fetcher.md
      - Clima & Meio Ambiente: clima/inmet-bdmep-data.md

  - Cookbook:
      - cookbook/index.md
      - Análise Econômica Multi-Fonte: cookbook/analise-economica-multi-fonte.md

plugins:
  - search

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  mathjax_config:
    tex:
      inlineMath: [['$', '$'], ['\\(', '\\)']]
      displayMath: [['$$', '$$'], ['\\[', '\\]']]

markdown_extensions:
  - attr_list
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
