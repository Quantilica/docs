site_name: Plataforma Brasileira de Dados Públicos
site_description: Ferramentas para extrair, processar e analisar datasets públicos brasileiros.
site_author: Komesu, D.K.

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.ico
  font:
    code: Google Sans Code
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

nav:
  - Início:
      - Visão Geral: index.md
      - Filosofia de Design: design-philosophy.md
      - Melhores Práticas: best-practices.md

  - Ferramentas & Fontes:
      - IBGE (Macroeconomia):
          - ibge/index.md
          - sidra-fetcher: ibge/sidra-fetcher.md
          - sidra-sql: ibge/sidra-sql.md
          - sidra-pipelines: ibge/sidra-pipelines.md
      - Tesouro (Finanças):
          - tesouro/index.md
          - tddata: tesouro/tddata.md
          - rtnpy: tesouro/rtnpy.md
          - Guia de Cálculo de Retornos: tesouro/calculo-retornos.md
      - Mercado de Trabalho:
          - trabalho/index.md
          - pdet-data: trabalho/pdet-data.md
          - Guia Parquet + Polars: trabalho/guia-parquet.md
      - Comércio Exterior: comex/comexdown.md
      - Saúde Pública: saude/datasus-fetcher.md
      - Clima & Meio Ambiente: clima/inmet-bdmep-data.md

  - Arquitetura & Conceitos:
      - Arquitetura da Plataforma: architecture/overview.md
      - Princípios de Design: architecture/design-principles.md
      - Engenharia de Dados: concepts/data-engineering.md
      - Pipelines & Armazenamento: concepts/pipelines.md

plugins:
  - search

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  mathjax_config:
    tex:
      inlineMath: [['$', '$'], ['\\(', '\\)']]
      displayMath: [['$$', '$$'], ['\\[', '\\]']]

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
